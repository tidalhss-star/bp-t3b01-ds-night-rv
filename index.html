    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { scroll-behavior: smooth; }
        
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Impact', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
            line-height: 1.4;

        }
        
        /* ----- TYPOGRAPHY ----- */
        h1, h2, h3, h4 { font-weight: 400; text-transform: uppercase; letter-spacing: -0.02em; }
        h1 { font-size: 4.2rem; line-height: 0.95; margin-bottom: 0.5rem; }
        h2 { font-size: 2.8rem; line-height: 1.0; margin-bottom: 1.5rem; border-bottom: 4px solid #ff3b00; display: inline-block; }

        a {
            color: #ff3b00;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.15s ease;
        }
        a:hover, a:focus { border-bottom-color: #ffffff; }
        
        /* ----- LAYOUT ----- */
        .container { padding: 72px; max-width: 100%; overflow-x: hidden; }
        .section-gap { margin-bottom: 120px; }
        .gap-48 { gap: 48px; }
        
        /* ----- HEADER / NAV ----- */
        header {
            background: #111111;
            border-bottom: 4px solid #ff3b00;
            padding: 24px 72px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 2.2rem;
            letter-spacing: -1px;
            color: #ffffff;
            transform: skew(-3deg);
            border: 3px solid #ff3b00;
            padding: 4px 16px;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 32px;
            font-size: 1.3rem;
            text-transform: uppercase;
        }
        .nav-links a { border-bottom: none; border: 2px solid transparent; padding: 4px 8px; }
        .nav-links a:hover { border-color: #ff3b00; background: rgba(255,59,0,0.1); }
        
        .hamburger {
            display: none;
            background: none;
            border: 3px solid #ff3b00;
            color: #ffffff;
            font-size: 2rem;
            padding: 8px 16px;
            cursor: pointer;
            line-height: 1;
            transform: skew(-5deg);
        }
        .hamburger:active { background: #ff3b00; color: #000; }
        
        /* ----- HERO ----- */
        .hero {
            padding: 80px 72px;
            margin-bottom: 120px;
            background: repeating-linear-gradient(135deg, #0a0a0a 0px, #0a0a0a 20px, #111111 20px, #111111 40px);
            border: 4px solid #ff3b00;
            transform: rotate(-1.5deg);
            margin-left: -72px;
            margin-right: -72px;
            padding-left: calc(72px + 4%);
            padding-right: calc(72px + 4%);
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px;
            width: 100%; height: 100%;
            border: 3px solid rgba(255,255,255,0.15);
            pointer-events: none;
        }
        .hero h1 { 
            font-size: 5.5rem; 
            color: #ffffff; 
            text-shadow: 6px 6px 0 #ff3b00;
            transform: skew(-3deg);
            max-width: 900px;
        }
        .hero p { 
            font-size: 1.6rem; 
            font-family: system-ui, sans-serif; 
            font-weight: 300;
            color: #cccccc;
            border-left: 6px solid #ff3b00;
            padding-left: 24px;
            margin-top: 24px;
            max-width: 700px;
        }
        .hero .stat-badge {
            display: inline-block;
            background: #ff3b00;
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            padding: 8px 24px;
            transform: skew(-5deg);
            border: 2px solid #fff;
            margin-top: 32px;
            font-family: system-ui, sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* ----- REVIEW CARDS ----- */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 48px;
            margin-top: 48px;
        }
        
        .review-card {
            background: #0d0d0d;
            border: 4px solid #ffffff;
            padding: 32px;
            transition: all 0.2s ease;
            position: relative;
        }
        .review-card:nth-child(odd) { transform: rotate(0.8deg); }
        .review-card:nth-child(even) { transform: rotate(-0.6deg); }
        .review-card:hover { 
            border-color: #ff3b00; 
            transform: scale(1.02) rotate(0deg) !important;
            background: #1a1a1a;
        }
        .review-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-family: system-ui, sans-serif;
        }
        .review-card .nickname { font-weight: 700; font-size: 1.1rem; }
        .review-card .date { color: #888; font-size: 0.9rem; }
        .review-card .stars { color: #ff3b00; font-size: 1.5rem; letter-spacing: 2px; }
        .review-card .body-text { font-family: system-ui, sans-serif; font-weight: 300; line-height: 1.6; }
        .review-card::after {
            content: '✓';
            position: absolute;
            bottom: 8px; right: 16px;
            font-size: 2rem;
            color: #ff3b00;
            opacity: 0.3;
        }
        
        /* ----- ABOUT / CTA ----- */
        .about-block {
            background: #111;
            border: 4px solid #ff3b00;
            padding: 64px;
            transform: skew(-0.5deg);
            margin-left: -24px;
            margin-right: -24px;
        }
        .about-block h2 { border-bottom-color: #ffffff; }
        .about-block .highlight { color: #ff3b00; font-weight: 700; }
        
        .cta-phone {
            display: inline-block;
            background: #ff3b00;
            color: #000;
            font-size: 2rem;
            padding: 16px 48px;
            border: 4px solid #fff;
            transform: skew(-5deg);
            margin-top: 32px;
            font-weight: 700;
            transition: all 0.2s;
            text-decoration: none;
            border-bottom: none;
        }
        .cta-phone:hover { 
            background: #ffffff; 
            color: #000; 
            border-color: #ff3b00;
            transform: skew(-5deg) scale(1.02);
        }
        
        /* ----- FOOTER ----- */
        footer {
            border-top: 4px solid #ff3b00;
            padding: 48px 72px;
            margin-top: 120px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 24px;
            font-family: system-ui, sans-serif;
            font-weight: 300;
        }
        footer a { border-bottom: 1px solid transparent; }
        footer a:hover { border-bottom-color: #ff3b00; }
        .copyright { color: #888; }
        
        /* ----- RESPONSIVE (mobile first) ----- */
        @media (max-width: 768px) {
            .container { padding: 32px; }
            header { padding: 16px 24px; }
            .logo { font-size: 1.6rem; }
            
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #111;
                border-bottom: 4px solid #ff3b00;
                padding: 24px;
                gap: 16px;
                font-size: 1.2rem;
            }
            .nav-links.active { display: flex; }
            
            .hamburger { display: block; }
            
            .hero {
                padding: 48px 24px;
                margin-left: -24px;
                margin-right: -24px;
                transform: rotate(-1deg);
            }
            .hero h1 { font-size: 2.8rem; text-shadow: 4px 4px 0 #ff3b00; }
            .hero p { font-size: 1.2rem; }
            .hero .stat-badge { font-size: 0.8rem; padding: 6px 16px; }
            
            h2 { font-size: 2rem; }
            .reviews-grid { grid-template-columns: 1fr; gap: 32px; }
            .review-card { transform: none !important; }
            .review-card:nth-child(odd) { transform: rotate(0.5deg) !important; }
            .review-card:nth-child(even) { transform: rotate(-0.5deg) !important; }
            
            .about-block { padding: 32px 24px; margin-left: -16px; margin-right: -16px; }
            .cta-phone { font-size: 1.4rem; padding: 12px 32px; }
            
            footer { padding: 32px 24px; flex-direction: column; text-align: center; }
        }
        
        @media (max-width: 480px) {
            .hero h1 { font-size: 2.2rem; }
            .container { padding: 16px; }
        }
    </style>
